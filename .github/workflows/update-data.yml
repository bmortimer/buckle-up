name: Update Belt Data

on:
  schedule:
    # Run every night at 3 AM ET (8 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if update is needed
        id: should-run
        run: |
          # Get current date info
          DAY_OF_MONTH=$(date +%-d)
          CURRENT_MONTH=$(date +%-m)

          # Always run on 1st or 15th (for error correction / catch-up)
          if [ "$DAY_OF_MONTH" -eq 1 ] || [ "$DAY_OF_MONTH" -eq 15 ]; then
            echo "Running monthly update (day $DAY_OF_MONTH)"
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # NBA season runs October through June - always update during these months
          if [ "$CURRENT_MONTH" -ge 10 ] || [ "$CURRENT_MONTH" -le 6 ]; then
            echo "NBA season months (Oct-Jun) - running update"
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # WNBA season runs May through October - always update during these months
          if [ "$CURRENT_MONTH" -ge 5 ] && [ "$CURRENT_MONTH" -le 10 ]; then
            echo "WNBA season months (May-Oct) - running update"
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "No unplayed games and not a monthly update day - skipping"
          echo "run=false" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.should-run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        if: steps.should-run.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest current WNBA season
        if: steps.should-run.outputs.run == 'true'
        run: |
          CURRENT_YEAR=$(date +%Y)
          python scripts/ingest_wnba.py --season $CURRENT_YEAR || echo "WNBA ingestion failed or season not started"

      - name: Ingest current NBA season
        if: steps.should-run.outputs.run == 'true'
        run: |
          # NBA season spans Oct-June across two calendar years
          # In Oct-Dec, season started this year (e.g., Oct 2025 = 2025-26)
          # In Jan-Sept, season started last year (e.g., Jan 2026 = 2025-26)
          CURRENT_MONTH=$(date +%-m)
          if [ "$CURRENT_MONTH" -ge 10 ]; then
            START_YEAR=$(date +%Y)
          else
            START_YEAR=$(($(date +%Y) - 1))
          fi
          END_YEAR=$((START_YEAR + 1))
          SEASON="${START_YEAR}-$(echo $END_YEAR | cut -c 3-4)"
          echo "Ingesting NBA season: $SEASON"
          python scripts/ingest_nba.py --season $SEASON || echo "NBA ingestion failed or season not started"

      - name: Check for changes
        if: steps.should-run.outputs.run == 'true'
        id: git-check
        run: |
          git diff --quiet data/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changes
        if: steps.should-run.outputs.run == 'true' && steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "Update belt data - $(date '+%Y-%m-%d')"
          git push
